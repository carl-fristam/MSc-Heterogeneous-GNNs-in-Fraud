<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Literature Map — GNNs for AML</title>
<style>
  :root {
    --bg: #1e1e1e;
    --surface: #252526;
    --border: #3c3c3c;
    --text: #cccccc;
    --text-dim: #888888;
    --accent: #569cd6;
    --core: #4ec9b0;
    --relevant: #dcdcaa;
    --secondary: #808080;
    --peripheral: #555555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  h1 { font-size: 18px; color: var(--accent); margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); margin-bottom: 16px; font-size: 12px; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filters button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
  }
  .filters button:hover { border-color: var(--accent); }
  .filters button.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Table */
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--surface);
    color: var(--accent);
    font-weight: 600;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-size: 12px;
  }
  th:hover { background: #2d2d30; }
  th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
  tr:hover td { background: #2a2d2e; }

  /* Column widths */
  th:nth-child(1), td:nth-child(1) { width: 30px; text-align: center; }
  th:nth-child(2), td:nth-child(2) { width: 24%; }
  th:nth-child(3), td:nth-child(3) { width: 180px; }
  th:nth-child(4), td:nth-child(4) { width: 12%; }
  th:nth-child(5), td:nth-child(5) { width: 50px; text-align: center; }
  th:nth-child(6), td:nth-child(6) { width: 85px; text-align: center;}
  th:nth-child(7), td:nth-child(7) { width: 100px; text-align: center;}
  th:nth-child(8), td:nth-child(8) { } /* summary takes remaining */

  /* Relevance badges */
  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-core { background: #1a3a2a; color: var(--core); border: 1px solid var(--core); }
  .badge-relevant { background: #2a2a1a; color: var(--relevant); border: 1px solid var(--relevant); }
  .badge-secondary { background: #2a2a2a; color: var(--secondary); border: 1px solid var(--secondary); }
  .badge-peripheral { background: #1e1e1e; color: var(--peripheral); border: 1px solid var(--peripheral); }

  /* Section pills */
  .section-pill {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    background: #2d2d30;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* Search */
  .search-bar { margin-bottom: 10px; }
  .search-bar input {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-dim); }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .pdf-link { color: var(--core); font-size: 11px; }
  .no-pdf { color: var(--peripheral); font-size: 11px; }

  /* Status dropdown */
  select.status-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    padding: 2px 4px;
    font-size: 11px;
    cursor: pointer;
    width: 80px;
  }
  select.status-select:focus { outline: none; border-color: var(--accent); }
  select.status-select[data-status="Done"]    { border-color: var(--core);       color: var(--core); }
  select.status-select[data-status="Reading"] { border-color: var(--relevant);   color: var(--relevant); }
  select.status-select[data-status="Skipped"] { border-color: var(--peripheral); color: var(--peripheral); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .stats span { color: var(--text); font-weight: 600; }
  .stats .progress { color: var(--core); }
</style>
</head>
<body>

<h1>Literature Map — GNNs for AML / Fraud Detection</h1>
<div class="subtitle">MSc Thesis (CBS) — click column headers to sort, use filters to narrow</div>

<div class="stats">
  Total: <span id="stat-total">28</span> &nbsp;|&nbsp;
  Core: <span id="stat-core">0</span> &nbsp;|&nbsp;
  Relevant: <span id="stat-relevant">0</span> &nbsp;|&nbsp;
  Secondary: <span id="stat-secondary">0</span> &nbsp;|&nbsp;
  Peripheral: <span id="stat-peripheral">0</span> &nbsp;|&nbsp;
  Showing: <span id="stat-showing">0</span> &nbsp;|&nbsp;
  Read: <span id="stat-done" class="progress">0</span> / <span id="stat-total2">0</span>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search titles, authors, summaries..." />
</div>

<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="Foundational Graph Methods">Foundational</button>
  <button data-filter="Heterogeneous GNNs for AML">Het. GNNs</button>
  <button data-filter="Temporal & Hybrid">Temporal</button>
  <button data-filter="Self-Supervised">Self-Supervised</button>
  <button data-filter="Surveys & Reviews">Surveys</button>
  <button data-filter="Knowledge Graphs">KG & Infra</button>
  <button data-filter="Explainability">XAI</button>
  <button data-filter="Peripheral">Peripheral</button>
  <button data-filter="core-only" style="margin-left:auto; border-color:var(--core);">Core only</button>
  <button data-filter="unread-only" style="border-color:var(--relevant);">Unread</button>
</div>

<table>
  <thead>
    <tr>
      <th data-col="num">#<span class="sort-arrow"></span></th>
      <th data-col="title">Title<span class="sort-arrow"></span></th>
      <th data-col="section">Section<span class="sort-arrow"></span></th>
      <th data-col="authors">Authors<span class="sort-arrow"></span></th>
      <th data-col="year">Year<span class="sort-arrow"></span></th>
      <th data-col="relevance">Relevance<span class="sort-arrow"></span></th>
      <th data-col="status">Status<span class="sort-arrow"></span></th>
      <th data-col="summary">Summary</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const LS_KEY = 'lit-status';
let DATA = [];
const tbody = document.getElementById('tbody');
let sortCol = 'num', sortAsc = true, activeFilter = 'all', searchQuery = '';

// --- Persist status in localStorage ---
function loadStatuses() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveStatus(num, value) {
  const s = loadStatuses();
  s[num] = value;
  localStorage.setItem(LS_KEY, JSON.stringify(s));
}

// --- CSV parser (handles quoted fields with commas) ---
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  });
}
function parseLine(line) {
  const result = []; let current = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

// --- Load CSV then init ---
fetch('literature.csv')
  .then(r => r.text())
  .then(text => {
    const rows = parseCSV(text);
    const saved = loadStatuses();
    DATA = rows.map(r => ({
      num: parseInt(r['#']) || 0,
      title: r['Title'] || '',
      section: r['Section'] || '',
      authors: r['Authors'] || '',
      year: r['Year'] ? parseInt(r['Year']) : null,
      url: r['URL'] || '',
      summary: r['Summary'] || '',
      relevance: r['Relevance'] || 'Secondary',
      status: saved[parseInt(r['#'])] || 'Unread',
    }));
    initUI();
    render(getFiltered());
  })
  .catch(err => {
    tbody.innerHTML = `<tr><td colspan="8" style="color:#f44;padding:20px;">Failed to load literature.csv — open this file via a local server or Live Server extension.<br><code>${err}</code></td></tr>`;
  });

function relevanceBadge(r) {
  const cls = {Core:'badge-core',Relevant:'badge-relevant',Secondary:'badge-secondary',Peripheral:'badge-peripheral'}[r]||'badge-secondary';
  return `<span class="badge ${cls}">${r}</span>`;
}

function statusSelect(d) {
  const opts = ['Unread','Reading','Done','Skipped'];
  const options = opts.map(o => `<option${o===d.status?' selected':''}>${o}</option>`).join('');
  return `<select class="status-select" data-num="${d.num}" data-status="${d.status}">${options}</select>`;
}

function render(data) {
  tbody.innerHTML = data.map(d => `<tr data-section="${d.section}" data-relevance="${d.relevance}" data-status="${d.status}">
    <td>${d.num}</td>
    <td><a href="${d.url}" target="_blank">${d.title}</a></td>
    <td><span class="section-pill">${d.section}</span></td>
    <td>${d.authors}</td>
    <td>${d.year||'—'}</td>
    <td>${relevanceBadge(d.relevance)}</td>
    <td>${statusSelect(d)}</td>
    <td>${d.summary}</td>
  </tr>`).join('');

  // Attach change listeners to dropdowns
  tbody.querySelectorAll('select.status-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const num = parseInt(sel.dataset.num);
      const value = sel.value;
      saveStatus(num, value);
      sel.dataset.status = value;
      const row = DATA.find(d => d.num === num);
      if (row) row.status = value;
      if (activeFilter === 'unread-only') render(getFiltered());
      else updateStats(getFiltered());
    });
  });

  updateStats(data);
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = DATA.length;
  document.getElementById('stat-total2').textContent = DATA.length;
  document.getElementById('stat-core').textContent = DATA.filter(d=>d.relevance==='Core').length;
  document.getElementById('stat-relevant').textContent = DATA.filter(d=>d.relevance==='Relevant').length;
  document.getElementById('stat-secondary').textContent = DATA.filter(d=>d.relevance==='Secondary').length;
  document.getElementById('stat-peripheral').textContent = DATA.filter(d=>d.relevance==='Peripheral').length;
  document.getElementById('stat-showing').textContent = data.length;
  document.getElementById('stat-done').textContent = DATA.filter(d=>d.status==='Done').length;
}

function getFiltered() {
  let d = [...DATA];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    d = d.filter(r => r.title.toLowerCase().includes(q) || r.authors.toLowerCase().includes(q) || r.summary.toLowerCase().includes(q));
  }
  if (activeFilter === 'core-only') d = d.filter(r => r.relevance === 'Core');
  else if (activeFilter === 'unread-only') d = d.filter(r => r.status === 'Unread');
  else if (activeFilter !== 'all') d = d.filter(r => r.section.includes(activeFilter));
  d.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = sortAsc ? Infinity : -Infinity;
    if (vb == null) vb = sortAsc ? Infinity : -Infinity;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
  return d;
}

function initUI() {
  // Sort
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      render(getFiltered());
    });
  });
  // Filter
  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render(getFiltered());
    });
  });
  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    render(getFiltered());
  });
}
</script>
</body>
</html>
