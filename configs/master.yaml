# ==============================================================================
# MASTER CONFIG — single source of truth for all experiment variants
#
# Shared settings (data, columns, split, features) are defined once at the top.
# Each variant only specifies what differs: graph topology (nodes + edges).
#
# Experiment ladder:
#   L0  Tabular XGBoost — no graph
#   L1  Homogeneous GNN — graph projected to single node/edge type
#   L2  Heterogeneous GNN — full typed graph
#
# Usage:
#   python run.py --level 0                              # tabular baseline
#   python run.py --level 1 --model sage --variant v1   # homo GNN
#   python run.py --level 2 --model hgt  --variant v1   # hetero GNN
#   python run.py --level 2 --model hgt  --variant v2   # finer edge typing
# ==============================================================================


# ── Data ─────────────────────────────────────────────────────────────────────

data_path: datasets/TRANSACTIONS_almost_clean.parquet
sample_ratio: 1.0   # 0.01 for dev

split:
  method: temporal
  train_end: "2025-07-01"
  val_end:   "2025-12-31"

cache:
  enabled: true
  dir: data/processed/bank


# ── Columns ──────────────────────────────────────────────────────────────────

columns:
  sender:        ACCOUNTID
  receiver:      COUNTERPARTYID
  timestamp:     EVENTTIME
  label:         CONFIRMEDRISK
  onus_flag:     TRANSACTIONONUS
  base_value:    BASEVALUE
  intl_flag:     INTERNATIONALFLAG
  org_trans_id:  ORGTRANSID
  sender_bank: ACCOUNTAGENTID  # sender's bank BIC (Danske Bank entity); used for sender_bank_diversity on external nodes

  # Pre-OHE'd column groups (already encoded in dataset)
  ohe_groups:
    branch_tbe:
      - ACCOUNTBRANCH_TBE_3055
      - ACCOUNTBRANCH_TBE_3098
      - ACCOUNTBRANCH_TBE_3161
      - ACCOUNTBRANCH_TBE_32AG
      - ACCOUNTBRANCH_TBE_32AN
      - ACCOUNTBRANCH_TBE_32BH
      - ACCOUNTBRANCH_TBE_3355
      - ACCOUNTBRANCH_TBE_35AC
      - ACCOUNTBRANCH_TBE_35AJ
      - ACCOUNTBRANCH_TBE_35AL
      - ACCOUNTBRANCH_TBE_36AK
      - ACCOUNTBRANCH_TBE_36AQ
      - ACCOUNTBRANCH_TBE_36AU
      - ACCOUNTBRANCH_TBE_36AW
      - ACCOUNTBRANCH_TBE_36CQ
      - ACCOUNTBRANCH_TBE_36CR
      - ACCOUNTBRANCH_TBE_36CS
      - ACCOUNTBRANCH_TBE_36CT
      - ACCOUNTBRANCH_TBE_36CU
      - ACCOUNTBRANCH_TBE_41AA
      - ACCOUNTBRANCH_TBE_rare
    counter_agent:
      - "COUNTERAGENT_TBE_           "
      - "COUNTERAGENT_TBE_ABBYGB2L   "
      - "COUNTERAGENT_TBE_DABADKKK   "
      - "COUNTERAGENT_TBE_DABAFIHH   "
      - "COUNTERAGENT_TBE_DABAGB2B   "
      - "COUNTERAGENT_TBE_DABASESX   "
      - "COUNTERAGENT_TBE_ESSESESS   "
      - "COUNTERAGENT_TBE_HANDSESS   "
      - "COUNTERAGENT_TBE_KLRNSESS   "
      - "COUNTERAGENT_TBE_LUNADK22   "
      - "COUNTERAGENT_TBE_MONZGB2L   "
      - "COUNTERAGENT_TBE_NAIAGB21   "
      - "COUNTERAGENT_TBE_NDEADKKK   "
      - "COUNTERAGENT_TBE_NDEAFIHH   "
      - "COUNTERAGENT_TBE_NDEASESS   "
      - "COUNTERAGENT_TBE_OKOYFIHH   "
      - "COUNTERAGENT_TBE_REVOGB21   "
      - "COUNTERAGENT_TBE_SBANFIHH   "
      - "COUNTERAGENT_TBE_SWEDSESS   "
      - "COUNTERAGENT_TBE_ULSBGB2B   "
      - COUNTERAGENT_TBE_rare
    clearing:
      - PAYMENTCLEARING_default
      - PAYMENTCLEARING_express
      - PAYMENTCLEARING_instant
      - "PAYMENTCLEARING_other  "
    submethod:
      - PAYMENTSUBMETHOD_accountClosure
      - PAYMENTSUBMETHOD_bankGiro
      - PAYMENTSUBMETHOD_futurePayment
      - PAYMENTSUBMETHOD_plusGiro
      - PAYMENTSUBMETHOD_realTime
    currency:
      - CURRENCY_TBE_DKK
      - CURRENCY_TBE_EUR
      - CURRENCY_TBE_GBP
      - CURRENCY_TBE_NOK
      - CURRENCY_TBE_SEK
      - CURRENCY_TBE_rare
    channel:
      - CHANNEL_atmPayment
      - CHANNEL_branch
      - CHANNEL_ebanking
      - CHANNEL_mobileBank
      - CHANNEL_openBanking
      - CHANNEL_swish
      - CHANNEL_webPayments
    sender_bank:
      - ACCOUNTAGENTID_DABADKKK
      - ACCOUNTAGENTID_DABAFIHH
      - ACCOUNTAGENTID_DABAGB2B
      - ACCOUNTAGENTID_DABANO22
      - ACCOUNTAGENTID_DABASESX
    counter_id_format:
      - COUNTERIDFORMAT_BBAN
      - COUNTERIDFORMAT_IBAN
    destination:
      - DESTINATION_TBE_DK
      - DESTINATION_TBE_FI
      - DESTINATION_TBE_GB
      - DESTINATION_TBE_NO
      - DESTINATION_TBE_SE
      - DESTINATION_TBE_rare

  customer_id:   CUSTOMERID


# ── Transaction / edge features (shared across ALL variants) ─────────────────

edge_features:
  - log_base_value
  - channel_ohe          # pre-encoded: CHANNEL_* columns
  - submethod_ohe        # pre-encoded: PAYMENTSUBMETHOD_* columns
  - clearing_ohe         # pre-encoded: PAYMENTCLEARING_* columns
  - currency_ohe         # pre-encoded: CURRENCY_TBE_* columns
  - destination_ohe      # pre-encoded: DESTINATION_TBE_* columns
  - international_flag
  - time_encoding


# ── Node feature sets (shared across ALL variants that use these node types) ─

node_features:
  internal_account:
    id_col: ACCOUNTID
    features:
      - out_degree
      - amount_stats
      - counterparty_diversity
      - channel_diversity
      - time_behavior
      - branch_tbe        # pre-encoded: ACCOUNTBRANCH_TBE_* columns — property of the sender account
      - sender_bank       # pre-encoded: ACCOUNTAGENTID_* columns — which Danske Bank entity

  external_account:
    id_col: COUNTERENTITYID
    exclude_if_sender: true
    features:
      - in_degree
      - received_amount_stats
      - sender_diversity
      - sender_bank_diversity
      - counter_agent     # pre-encoded: COUNTERAGENT_TBE_* columns — which bank the counterparty is at
      - counter_id_format # pre-encoded: COUNTERIDFORMAT_* columns — BBAN or IBAN


# ==============================================================================
# VARIANTS — only the graph topology changes
# ==============================================================================

variants:

  # ── V1: Baseline — onus vs external (2 edge types) ────────────────────────
  v1:
    nodes: [internal_account, external_account]
    edges:
      - name: onus_transfer
        src:  internal_account
        dst:  internal_account
        filter: "TRANSACTIONONUS == True"

      - name: external_transfer
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False"

