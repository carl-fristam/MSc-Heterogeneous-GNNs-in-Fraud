# ==============================================================================
# MASTER CONFIG — single source of truth for all experiment variants
#
# Shared settings (data, columns, split, features) are defined once at the top.
# Each variant only specifies what differs: graph topology (nodes + edges).
#
# Usage:
#   python run.py --level 0                          (uses shared settings only)
#   python run.py --level 3 --task edge --variant v1 (merges v1 into shared)
# ==============================================================================


# ── Data ─────────────────────────────────────────────────────────────────────

data_path: datasets/bank_transactions.parquet
sample_ratio: 1.0   # 0.01 for dev

split:
  method: temporal
  train_end: "2023-04-01"
  val_end:   "2023-06-01"

cache:
  enabled: true
  dir: data/processed/bank


# ── Columns ──────────────────────────────────────────────────────────────────

columns:
  sender:        ACCOUNTID
  receiver:      COUNTERENTITYID
  timestamp:     EVENTTIME
  label:         CONFIRMEDRISK
  onus_flag:     TRANSACTIONONUS
  device:        DEVICEID
  customer_type: CUSTOMERTYPE
  sender_bank:   ACCOUNTAGENTID
  receiver_bank: COUNTERAGENTID
  channel:       CHANNEL
  method:        PAYMENTMETHOD
  submethod:     PAYMENTSUBMETHOD
  clearing:      PAYMENTCLEARING
  value:         VALUE
  base_value:    BASEVALUE
  currency:      CURRENCY
  base_currency: BASECURRENCY
  intl_flag:     INTERNATIONALFLAG

  drop:
    - COUNTERPARTYID
    - ACCOUNTENTITYID
    - CUSTOMERENTITYID
    - DEVICEENTITYID
    - CUSTOMERID
    - MSGSTATUS
    - ACCOUNTIDFORMAT
    - COUNTERIDFORMAT
    - ACCOUNTBRANCHID
    - COUNTERBRANCHID
    - EXCEPTIONRULE


# ── Transaction / edge features (shared across ALL variants) ─────────────────

edge_features:
  - log_value
  - log_base_value
  - currency_mismatch
  - channel_ohe
  - method_ohe
  - submethod_ohe
  - clearing_express
  - international_flag
  - time_encoding


# ── Node feature sets (shared across ALL variants that use these node types) ─

node_features:
  internal_account:
    id_col: ACCOUNTID
    features:
      - out_degree
      - amount_stats
      - counterparty_diversity
      - device_diversity
      - channel_diversity
      - time_behavior
      - customer_type_ohe

  external_account:
    id_col: COUNTERENTITYID
    exclude_if_sender: true
    features:
      - in_degree
      - received_amount_stats
      - sender_diversity
      - sender_bank_diversity

  device:
    id_col: DEVICEID
    features:
      - device_tx_count
      - device_acct_diversity


# ==============================================================================
# VARIANTS — only the graph topology changes
# ==============================================================================

variants:

  # ── V1: Baseline — onus vs external (2 edge types) ────────────────────────
  v1:
    nodes: [internal_account, external_account]
    edges:
      - name: onus_transfer
        src:  internal_account
        dst:  internal_account
        filter: "TRANSACTIONONUS == True"

      - name: external_transfer
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False"

  # ── V2: Payment rail typed edges (6 edge types) ───────────────────────────
  v2:
    nodes: [internal_account, external_account]
    edges:
      - name: onus_transfer
        src:  internal_account
        dst:  internal_account
        filter: "TRANSACTIONONUS == True"

      - name: ext_realtime
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False and PAYMENTSUBMETHOD == 'realTime'"

      - name: ext_giro
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False and PAYMENTSUBMETHOD in ['bankGiro', 'plusGiro']"

      - name: ext_future
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False and PAYMENTSUBMETHOD == 'futurePayment'"

      - name: ext_salary
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False and PAYMENTSUBMETHOD == 'salary'"

      - name: ext_other
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False and PAYMENTSUBMETHOD not in ['realTime', 'bankGiro', 'plusGiro', 'futurePayment', 'salary']"

  # ── V3: Device nodes added (V1 + device linkage) ──────────────────────────
  v3:
    nodes: [internal_account, external_account, device]
    edges:
      - name: onus_transfer
        src:  internal_account
        dst:  internal_account
        filter: "TRANSACTIONONUS == True"

      - name: external_transfer
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False"

      - name: uses_device
        src:     internal_account
        dst:     device
        src_col: ACCOUNTID
        dst_col: DEVICEID
        has_label: false
        features: []
        deduplicate: true

  # ── TXN_V1: Transactions as nodes (node classification) ───────────────────
  txn_v1:
    nodes: [transaction, internal_account, external_account]
    transaction_features:   # same as edge_features, applied to transaction nodes
      - log_value
      - log_base_value
      - currency_mismatch
      - channel_ohe
      - method_ohe
      - submethod_ohe
      - clearing_express
      - international_flag
      - time_encoding
    edges:
      - name: sends
        src: internal_account
        dst: transaction

      - name: received_by_internal
        src: transaction
        dst: internal_account
        filter: "TRANSACTIONONUS == True"

      - name: received_by_external
        src: transaction
        dst: external_account
        filter: "TRANSACTIONONUS == False"
