# ==============================================================================
# MASTER CONFIG — single source of truth for all experiment variants
#
# Shared settings (data, columns, split, features) are defined once at the top.
# Each variant only specifies what differs: graph topology (nodes + edges).
#
# All feature engineering, encoding, and scaling is done externally.
# This repo only does graph construction and model training.
#
# Usage:
#   python run.py --mode tab
#   python run.py --mode het --model hgt
# ==============================================================================


# ── Data ─────────────────────────────────────────────────────────────────────

split:
  method: external
  dir: datasets/splits/          # expects train.parquet, val.parquet, test.parquet

cache:
  enabled: true
  dir: data/processed/bank


# ── Columns ──────────────────────────────────────────────────────────────────

columns:
  sender:         ACCOUNTID
  receiver:       COUNTERPARTYID
  timestamp:      EVENTTIME
  label:          CONFIRMEDRISK
  onus_flag:      TRANSACTIONONUS
  base_value:     BASEVALUE
  transaction_id: TRANSACTIONID
  customer_id:    CUSTOMERID


# ── Edge features (per-transaction, pre-computed) ────────────────────────────
#
# Two feature sets:
#   lean (default) — 30 raw transaction properties for GNNs
#                    MP replaces hand-engineered aggregations (Fey et al. 2023)
#   full           — 91 features including velocity/novelty (--full-features)
#                    use for ablation: does adding engineered features help GNNs?
#
# XGBoost always sees ALL numeric columns regardless of this setting.

edge_features_lean:
  # amount
  - log_basevalue
  # transaction properties
  - INTERNATIONALFLAG
  - is_foreign_currency
  # channel (drop-first OHE)
  - CHANNEL_branch
  - CHANNEL_ebanking
  - CHANNEL_mobileBank
  - CHANNEL_openBanking
  - CHANNEL_swish
  - CHANNEL_webPayments
  # clearing type (drop-first OHE)
  - PAYMENTCLEARING_express
  - PAYMENTCLEARING_instant
  - PAYMENTCLEARING_other
  # payment submethod (drop-first OHE)
  - PAYMENTSUBMETHOD_bankGiro
  - PAYMENTSUBMETHOD_futurePayment
  - PAYMENTSUBMETHOD_plusGiro
  - PAYMENTSUBMETHOD_realTime
  # currency (drop-first OHE)
  - CURRENCY_EUR
  - CURRENCY_GBP
  - CURRENCY_NOK
  - CURRENCY_RARE
  - CURRENCY_SEK
  # destination country (drop-first OHE)
  - DESTINATIONCOUNTRY_FI
  - DESTINATIONCOUNTRY_GB
  - DESTINATIONCOUNTRY_NO
  - DESTINATIONCOUNTRY_RARE
  - DESTINATIONCOUNTRY_SE
  # cyclical time encoding (pre-computed)
  - hour_sin
  - hour_cos
  - dow_sin
  - dow_cos

edge_features_full:
  # ── everything in lean ──
  - log_basevalue
  - INTERNATIONALFLAG
  - is_foreign_currency
  - CHANNEL_branch
  - CHANNEL_ebanking
  - CHANNEL_mobileBank
  - CHANNEL_openBanking
  - CHANNEL_swish
  - CHANNEL_webPayments
  - PAYMENTCLEARING_express
  - PAYMENTCLEARING_instant
  - PAYMENTCLEARING_other
  - PAYMENTSUBMETHOD_bankGiro
  - PAYMENTSUBMETHOD_futurePayment
  - PAYMENTSUBMETHOD_plusGiro
  - PAYMENTSUBMETHOD_realTime
  - CURRENCY_EUR
  - CURRENCY_GBP
  - CURRENCY_NOK
  - CURRENCY_RARE
  - CURRENCY_SEK
  - DESTINATIONCOUNTRY_FI
  - DESTINATIONCOUNTRY_GB
  - DESTINATIONCOUNTRY_NO
  - DESTINATIONCOUNTRY_RARE
  - DESTINATIONCOUNTRY_SE
  - hour_sin
  - hour_cos
  - dow_sin
  - dow_cos
  # ── additional engineered features ──
  - is_nighttime
  - is_weekend
  # temporal context
  - time_since_prev_txn
  - log_time_since_prev_txn
  - is_first_txn_for_customer
  - time_since_first_txn
  # novelty flags
  - is_new_destinationcountry_for_customer
  - is_new_destinationc_for_customer
  - is_new_counterparty_for_customer
  - is_new_channel_for_customer
  - is_new_paymentsubme_for_customer
  - is_new_intl_dest_for_customer
  # customer velocity — amount (1D / 7D / 30D)
  - cust_amt_count_1D
  - cust_amt_mean_1D
  - cust_amt_std_1D
  - cust_amt_max_1D
  - cust_amt_sum_1D
  - cust_amt_count_7D
  - cust_amt_mean_7D
  - cust_amt_std_7D
  - cust_amt_max_7D
  - cust_amt_sum_7D
  - cust_amt_count_30D
  - cust_amt_mean_30D
  - cust_amt_std_30D
  - cust_amt_max_30D
  - cust_amt_sum_30D
  # customer velocity — destination (1D / 7D / 30D)
  - cust_destinatio_count_1D
  - cust_destinatio_mean_1D
  - cust_destinatio_sum_1D
  - cust_destinatio_count_7D
  - cust_destinatio_mean_7D
  - cust_destinatio_sum_7D
  - cust_destinatio_count_30D
  - cust_destinatio_mean_30D
  - cust_destinatio_sum_30D
  # customer velocity — counterparty (1D / 7D / 30D)
  - cust_counterpar_count_1D
  - cust_counterpar_mean_1D
  - cust_counterpar_sum_1D
  - cust_counterpar_count_7D
  - cust_counterpar_mean_7D
  - cust_counterpar_sum_7D
  - cust_counterpar_count_30D
  - cust_counterpar_mean_30D
  - cust_counterpar_sum_30D
  # customer velocity — payment submethod (1D / 7D / 30D)
  - cust_paymentsub_count_1D
  - cust_paymentsub_mean_1D
  - cust_paymentsub_sum_1D
  - cust_paymentsub_count_7D
  - cust_paymentsub_mean_7D
  - cust_paymentsub_sum_7D
  - cust_paymentsub_count_30D
  - cust_paymentsub_mean_30D
  - cust_paymentsub_sum_30D
  # customer velocity — nighttime (7D / 30D)
  - cust_night_share_7D
  - cust_night_count_7D
  - cust_night_share_30D
  - cust_night_count_30D
  # ratios
  - txn_to_avg_ratio
  - txn_to_median_ratio
  # pair feature
  - IS_SAFE_PAIR


# ── Node features (per-account, pre-computed) ────────────────────────────────

node_features:
  internal_account:
    id_col: ACCOUNTID
    columns:
      - accountbranchid_te
      - accagentcountry_te

  external_account:
    id_col: COUNTERPARTYID
    columns:
      - counteragentid_te
      - counterpartyid_te
      - COUNTERIDFORMAT_IBAN


# ==============================================================================
# VARIANTS — only the graph topology changes
# ==============================================================================

variants:

  # ── V1: Baseline — onus vs external (2 edge types) ────────────────────────
  v1:
    nodes: [internal_account, external_account]
    edges:
      - name: onus_transfer
        src:  internal_account
        dst:  internal_account
        filter: "TRANSACTIONONUS == True"

      - name: external_transfer
        src:  internal_account
        dst:  external_account
        filter: "TRANSACTIONONUS == False"
