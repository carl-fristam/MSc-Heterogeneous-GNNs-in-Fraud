# Graph pipeline configuration for SAML-D dataset

dataset: saml-d
data_path: datasets/SAML-D.csv
sample_ratio: 0.01 # Use 1% for dev; set to 1.0 for full run

# Temporal train/val/test split
# SAML-D date range: 2022-10-07 to 2023-08-23
split:
  train_end_date: "2023-04-01" # ~6 months train
  val_end_date: "2023-06-01" # ~2 months val, rest is test

# Graph structure
graph:
  add_reverse_edges: true

# Features (null = use all registered features)
features:
  transaction: null
  account: null

# Caching
cache:
  enabled: false
  dir: data/processed
